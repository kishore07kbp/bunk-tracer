name: attendance_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Device information (Android ID)
  device_info_plus: ^10.0.0

  # Local storage
  shared_preferences: ^2.2.3

  # Token generation / hashing
  crypto: ^3.0.3

  # Cupertino icons
  cupertino_icons: ^1.0.8

  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  uuid: ^4.4.0
  flutter_ble_peripheral: ^2.1.0
  permission_handler: ^12.0.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true